<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="description" content="毎日の食事のカロリーを手軽に記録・管理できるカロリー計算アプリ" />
  <title>CalcKcal — カロリー計算</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CalcKcal" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- スマホ画面を模したフレーム -->
  <div id="app" class="app">

    <!-- ヘッダー -->
    <header id="appHeader" class="app-header">
      <button id="backBtn" class="icon-btn hidden" aria-label="戻る">‹</button>
      <h1 id="headerTitle">CalcKcal</h1>
      <div class="header-spacer"></div>
    </header>

    <!-- 画面が描画されるメインエリア -->
    <main id="screen" class="screen"></main>

    <!-- ＋記録 FAB -->
    <button id="fab" class="fab hidden" aria-label="記録を追加">＋</button>

    <!-- 下部タブ -->
    <nav id="tabbar" class="tabbar hidden">
      <button class="tab" data-tab="home">
        <span class="tab-ico">🏠</span><span class="tab-lbl">ホーム</span>
      </button>
      <button class="tab" data-tab="record">
        <span class="tab-ico">📝</span><span class="tab-lbl">記録</span>
      </button>
      <button class="tab" data-tab="history">
        <span class="tab-ico">📊</span><span class="tab-lbl">履歴</span>
      </button>
      <button class="tab" data-tab="mypage">
        <span class="tab-ico">👤</span><span class="tab-lbl">マイページ</span>
      </button>
    </nav>
  </div>

  <!-- モーダル（食品詳細・数量入力など） -->
  <div id="modalRoot"></div>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>

  <!-- Service Worker 登録（PWA / オフライン対応） -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function (err) {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
